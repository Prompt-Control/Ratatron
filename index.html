<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ratatron Live - Google Drive Streaming</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --cream: #F9F7F5;
      --orange: #FF6B35;
      --navy: #1A1A1A;
      --green: #2ECB71;
      --gray-light: #E8E6E3;
      --white: #FFFFFF;
      --error: #E74C3C;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
      background: var(--cream);
      color: var(--navy);
      min-height: 100vh;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 16px; }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .logo { font-size: 24px; font-weight: 600; color: var(--orange); }
    button {
      padding: 10px 16px;
      border: 1px solid var(--gray-light);
      background: var(--white);
      color: var(--navy);
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
    }
    button:hover { border-color: var(--orange); background: var(--cream); }
    button.primary { background: var(--orange); color: white; border-color: var(--orange); }
    button.primary.recording { background: var(--error); animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } }
    .alert {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      display: none;
      font-weight: 500;
    }
    .alert.show { display: block; }
    .alert.error { background: rgba(231, 76, 60, 0.15); border: 1px solid var(--error); color: var(--error); }
    .alert.success { background: rgba(46, 203, 113, 0.15); border: 1px solid var(--green); color: var(--green); }
    .alert.warning { background: rgba(255, 152, 0, 0.15); border: 1px solid #FF9800; color: #FF9800; }
    .video-container {
      position: relative;
      background: var(--navy);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 24px;
      aspect-ratio: 16/9;
    }
    video { width: 100%; height: 100%; }
    .overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.7); color: white; flex-direction: column; gap: 16px; }
    .overlay.hidden { display: none; }
    .progress-bar { width: 100%; height: 8px; background: var(--gray-light); border-radius: 4px; overflow: hidden; margin-bottom: 12px; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--orange), var(--green)); width: 0%; transition: width 0.3s; }
    .status-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .status-card { background: var(--white); border: 1px solid var(--gray-light); border-radius: 8px; padding: 16px; text-align: center; }
    .status-label { font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 8px; }
    .status-value { font-size: 18px; font-weight: 600; color: var(--orange); }
    .section { background: var(--white); border: 1px solid var(--gray-light); border-radius: 12px; padding: 20px; margin-bottom: 24px; }
    .section-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
    .timer { font-family: monospace; font-size: 28px; font-weight: 600; color: var(--orange); text-align: center; margin-bottom: 16px; display: none; }
    .drive-link { padding: 16px; background: rgba(46, 203, 113, 0.1); border: 1px solid var(--green); border-radius: 8px; margin-top: 16px; display: none; }
    .drive-link a { color: var(--orange); text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo">🐀 Ratatron Live</div>
    <div><span id="status">Initializing...</span></div>
  </header>

  <div id="errorAlert" class="alert error"></div>
  <div id="successAlert" class="alert success"></div>
  <div id="warningAlert" class="alert warning"></div>

  <div class="video-container">
    <video id="video" autoplay muted playsinline></video>
    <div class="overlay" id="overlay">
      <div style="font-size: 48px;">📷</div>
      <button class="primary" onclick="requestCamera()">Request Camera</button>
    </div>
  </div>

  <div class="timer" id="timer">00:00:00</div>

  <div class="progress-bar" id="progressContainer" style="display: none;">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="status-grid">
    <div class="status-card">
      <div class="status-label">Connection</div>
      <div class="status-value" id="connStatus">—</div>
    </div>
    <div class="status-card">
      <div class="status-label">Chunks Sent</div>
      <div class="status-value" id="chunksStatus">0</div>
    </div>
    <div class="status-card">
      <div class="status-label">Data Uploaded</div>
      <div class="status-value" id="dataStatus">0 MB</div>
    </div>
    <div class="status-card">
      <div class="status-label">Server Status</div>
      <div class="status-value" id="serverStatus">—</div>
    </div>
  </div>

  <div style="margin-bottom: 24px;">
    <button class="primary" id="startBtn" onclick="startRecording()">🎥 Start Recording</button>
    <button class="primary" id="stopBtn" style="display: none; background: var(--error);" onclick="stopRecording()">⏹ Stop</button>
  </div>

  <div class="section">
    <div class="section-title">📁 Google Drive</div>
    <button onclick="testConnection()">✓ Test Connection</button>
    <button onclick="authenticateDrive()">🔐 Authenticate</button>
    <div id="driveLink" class="drive-link"></div>
  </div>

  <div class="section">
    <div class="section-title">📊 Info</div>
    <div style="font-size: 13px; line-height: 2;">
      <div><strong>Session:</strong> <span id="sessionId">None</span></div>
      <div><strong>Server:</strong> <span id="serverUrl">http://localhost:3000</span></div>
      <div id="log" style="margin-top: 16px; padding: 12px; background: #f5f5f5; border-radius: 6px; font-family: monospace; font-size: 11px; max-height: 200px; overflow-y: auto;"></div>
    </div>
  </div>
</div>

<script>
const SERVER_URL = window.location.origin; // Auto-detect from current URL
const WS_URL = `${window.location.protocol === 'https:' ? 'wss:' : 'ws:'}//${window.location.host}`;

let state = {
  camera: null,
  recorder: null,
  mediaStream: null,
  sessionId: null,
  isRecording: false,
  recordingStart: null,
  timerInterval: null,
  chunksSent: 0,
  dataSent: 0,
  ws: null
};

const log = (msg) => {
  console.log(msg);
  const logDiv = document.getElementById('log');
  const time = new Date().toLocaleTimeString();
  logDiv.innerHTML += `[${time}] ${msg}<br>`;
  logDiv.scrollTop = logDiv.scrollHeight;
};

const alert = (msg, type = 'error') => {
  document.getElementById(`${type}Alert`).textContent = msg;
  document.getElementById(`${type}Alert`).className = `alert ${type} show`;
  setTimeout(() => {
    document.getElementById(`${type}Alert`).classList.remove('show');
  }, 5000);
};

async function testConnection() {
  try {
    const res = await fetch(`${SERVER_URL}/api/health`);
    const data = await res.json();
    log(`✓ Server connected | Drive: ${data.driveAuthenticated ? '✓' : '✗'}`);
    alert(`✓ Connected! Google Drive: ${data.driveAuthenticated ? 'Ready' : 'Not authenticated'}`, 'success');
    document.getElementById('serverStatus').textContent = data.driveAuthenticated ? '✓ Ready' : '⚠ Auth needed';
    document.getElementById('status').textContent = data.driveAuthenticated ? '✓ Ready' : '⚠ Authenticate';
    document.getElementById('connStatus').textContent = '✓ Connected';
  } catch (err) {
    log(`✗ Connection failed: ${err.message}`);
    alert(`Connection failed: ${err.message}`, 'error');
    document.getElementById('status').textContent = '✗ Error';
    document.getElementById('connStatus').textContent = '✗ Failed';
  }
}

async function authenticateDrive() {
  try {
    const res = await fetch(`${SERVER_URL}/api/auth/google-url`);
    const { authUrl } = await res.json();
    window.location.href = authUrl;
  } catch (err) {
    alert('Failed to get auth URL', 'error');
  }
}

async function requestCamera() {
  try {
    // Check if getUserMedia is available
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      throw new Error('Camera not supported on this device');
    }

    state.mediaStream = await navigator.mediaDevices.getUserMedia({
      video: { 
        width: { ideal: 1280 }, 
        height: { ideal: 720 },
        facingMode: 'user'
      },
      audio: true
    });
    
    document.getElementById('video').srcObject = state.mediaStream;
    document.getElementById('overlay').classList.add('hidden');
    log('✓ Camera access granted');
    alert('✓ Camera ready', 'success');
  } catch (err) {
    log(`✗ Camera error: ${err.name} - ${err.message}`);
    
    if (err.name === 'NotAllowedError') {
      alert('Camera permission denied. Allow access in settings.', 'error');
    } else if (err.name === 'NotFoundError') {
      alert('No camera found on this device', 'error');
    } else {
      alert(`Camera error: ${err.message}`, 'error');
    }
  }
}

async function startRecording() {
  if (!state.mediaStream) {
    alert('Request camera first', 'error');
    return;
  }

  state.sessionId = `session-${Date.now()}`;
  state.isRecording = true;
  state.chunksSent = 0;
  state.dataSent = 0;
  state.recordingStart = Date.now();

  log(`🎥 Recording started - Session: ${state.sessionId}`);
  document.getElementById('sessionId').textContent = state.sessionId;
  document.getElementById('startBtn').style.display = 'none';
  document.getElementById('stopBtn').style.display = 'inline-block';
  document.getElementById('stopBtn').classList.add('recording');
  document.getElementById('timer').style.display = 'block';
  document.getElementById('progressContainer').style.display = 'block';
  document.getElementById('connStatus').textContent = 'Recording';

  startTimer();

  // Create media recorder with proper settings
  const options = { mimeType: 'video/webm;codecs=vp9' };
  if (!MediaRecorder.isTypeSupported(options.mimeType)) {
    options.mimeType = 'video/webm';
  }

  state.recorder = new MediaRecorder(state.mediaStream, options);
  const chunks = [];

  state.recorder.ondataavailable = (evt) => {
    if (evt.data.size > 0) {
      chunks.push(evt.data);
    }
  };

  state.recorder.onstop = () => {
    log('⏹ Recording stopped, stitching chunks...');
    const blob = new Blob(chunks, { type: 'video/webm' });
    uploadChunk(blob, state.chunksSent, state.chunksSent + 1);
  };

  // Collect data every 5 seconds and upload as chunks
  state.recorder.start();

  const uploadInterval = setInterval(() => {
    if (!state.isRecording) {
      clearInterval(uploadInterval);
      return;
    }

    state.recorder.pause();
    state.recorder.requestData();
    state.recorder.resume();
  }, 5000);
}

async function uploadChunk(blob, index, total) {
  try {
    const sizeMB = (blob.size / 1024 / 1024).toFixed(2);
    log(`📤 Uploading chunk ${index + 1}/${total} (${sizeMB}MB)...`);

    const formData = new FormData();
    formData.append('chunk', blob);
    formData.append('sessionId', state.sessionId);
    formData.append('chunkIndex', index);
    formData.append('totalChunks', total);
    formData.append('preset', '4g');

    const res = await fetch(`${SERVER_URL}/api/upload-chunk`, {
      method: 'POST',
      body: formData
    });

    const data = await res.json();

    if (res.ok) {
      state.chunksSent++;
      state.dataSent += parseFloat(sizeMB);
      document.getElementById('chunksStatus').textContent = state.chunksSent;
      document.getElementById('dataStatus').textContent = state.dataSent.toFixed(1) + ' MB';
      log(`✓ Chunk uploaded | Server has: ${data.received}/${data.totalChunks}`);
      updateProgress(20 + (data.received / data.totalChunks * 60));

      if (data.allReceived) {
        log('✓ All chunks received by server! Processing....');
        pollSessionStatus();
      }
    } else {
      log(`✗ Upload failed: ${data.error}`);
      alert(`Upload error: ${data.error}`, 'error');
    }
  } catch (err) {
    log(`✗ Upload error: ${err.message}`);
    alert(`Upload failed: ${err.message}`, 'error');
  }
}

function startTimer() {
  state.timerInterval = setInterval(() => {
    if (state.recordingStart) {
      const elapsed = Math.floor((Date.now() - state.recordingStart) / 1000);
      const h = Math.floor(elapsed / 3600);
      const m = Math.floor((elapsed % 3600) / 60);
      const s = elapsed % 60;
      document.getElementById('timer').textContent = 
        `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }
  }, 100);
}

function stopRecording() {
  state.isRecording = false;
  clearInterval(state.timerInterval);
  
  if (state.recorder && state.recorder.state !== 'inactive') {
    state.recorder.stop();
  }

  document.getElementById('startBtn').style.display = 'inline-block';
  document.getElementById('stopBtn').style.display = 'none';
  document.getElementById('stopBtn').classList.remove('recording');
  document.getElementById('connStatus').textContent = 'Processing';
  log('⏹ Recording stopped');
}

function pollSessionStatus() {
  const checkStatus = setInterval(async () => {
    try {
      const res = await fetch(`${SERVER_URL}/api/session/${state.sessionId}`);
      const session = await res.json();

      log(`Session status: ${session.status}`);
      updateProgress(20 + (Math.random() * 30));

      if (session.status === 'completed') {
        clearInterval(checkStatus);
        log('✓ Upload to Google Drive complete!');
        log(`📁 File: ${session.fileName}`);
        log(`🔗 Link: ${session.driveLink}`);
        
        document.getElementById('connStatus').textContent = '✓ Complete';
        updateProgress(100);
        alert('✓ Video stored in Google Drive!', 'success');

        const linkDiv = document.getElementById('driveLink');
        linkDiv.innerHTML = `
          <strong>📁 Google Drive:</strong><br>
          <a href="${session.driveLink}" target="_blank">${session.fileName}</a>
        `;
        linkDiv.style.display = 'block';
      } else if (session.status === 'error') {
        clearInterval(checkStatus);
        log(`✗ Error: ${session.error}`);
        alert(`Server error: ${session.error}`, 'error');
      }
    } catch (err) {
      log(`Status check error: ${err.message}`);
    }
  }, 2000);
}

function updateProgress(percent) {
  document.getElementById('progressFill').style.width = Math.min(percent, 100) + '%';
}

// Check connection on load
window.addEventListener('load', () => {
  document.getElementById('serverUrl').textContent = SERVER_URL;
  document.getElementById('status').textContent = 'Connecting...';
  
  testConnection();
  
  // Check for auth callback
  const params = new URLSearchParams(window.location.search);
  if (params.get('auth') === 'success') {
    alert('✓ Google Drive authenticated!', 'success');
    window.history.replaceState({}, document.title, window.location.pathname);
  }
});

// Cleanup
window.addEventListener('beforeunload', () => {
  if (state.mediaStream) {
    state.mediaStream.getTracks().forEach(t => t.stop());
  }
  if (state.recorder) {
    state.recorder.stop();
  }
});
</script>

</body>
</html>
